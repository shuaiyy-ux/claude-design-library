name: Validate

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Validate entries
        run: npx -y tsx scripts/validate.ts
      - name: Rebuild index and check it matches committed
        run: |
          npx -y tsx scripts/build-index.ts
          git diff --exit-code index.json || {
            echo "::error::index.json is out of date. Run 'npx tsx scripts/build-index.ts' locally and commit.";
            exit 1;
          }
