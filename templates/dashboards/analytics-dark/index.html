<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analytics · Dark</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-slate-950 text-slate-200 font-sans antialiased">
    <div class="flex min-h-screen">
      <aside class="w-60 border-r border-slate-800 p-6 hidden md:block">
        <div class="font-bold text-lg mb-8">◆ Meter</div>
        <nav class="space-y-1 text-sm">
          <a class="block px-3 py-2 rounded-lg bg-slate-800 text-white" href="#">Overview</a>
          <a class="block px-3 py-2 rounded-lg text-slate-400 hover:text-white" href="#">Users</a>
          <a class="block px-3 py-2 rounded-lg text-slate-400 hover:text-white" href="#">Revenue</a>
          <a class="block px-3 py-2 rounded-lg text-slate-400 hover:text-white" href="#">Settings</a>
        </nav>
      </aside>

      <main class="flex-1 p-8">
        <header class="flex items-center justify-between mb-8">
          <h1 class="text-2xl font-semibold">Overview</h1>
          <div class="flex gap-2">
            <button class="px-3 py-1.5 text-sm border border-slate-700 rounded-lg">Last 7 days</button>
            <button class="px-3 py-1.5 text-sm bg-indigo-500 text-white rounded-lg">Export</button>
          </div>
        </header>

        <section class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
          <div class="p-5 rounded-xl bg-slate-900 border border-slate-800">
            <div class="text-sm text-slate-400">MRR</div>
            <div class="text-3xl font-bold mt-2">$24,190</div>
            <div class="text-xs text-emerald-400 mt-1">+12.4%</div>
          </div>
          <div class="p-5 rounded-xl bg-slate-900 border border-slate-800">
            <div class="text-sm text-slate-400">Active users</div>
            <div class="text-3xl font-bold mt-2">8,412</div>
            <div class="text-xs text-emerald-400 mt-1">+3.1%</div>
          </div>
          <div class="p-5 rounded-xl bg-slate-900 border border-slate-800">
            <div class="text-sm text-slate-400">Churn</div>
            <div class="text-3xl font-bold mt-2">2.4%</div>
            <div class="text-xs text-rose-400 mt-1">+0.3%</div>
          </div>
          <div class="p-5 rounded-xl bg-slate-900 border border-slate-800">
            <div class="text-sm text-slate-400">NPS</div>
            <div class="text-3xl font-bold mt-2">62</div>
            <div class="text-xs text-emerald-400 mt-1">+4</div>
          </div>
        </section>

        <section class="p-6 rounded-xl bg-slate-900 border border-slate-800 mb-8">
          <div class="text-sm text-slate-400 mb-4">Revenue (last 30d)</div>
          <div class="h-48 flex items-end gap-2">
            <!-- quick bar chart -->
            <template id="bars"></template>
            <script>
              const wrap = document.currentScript.parentElement;
              const heights = [30,45,38,55,42,60,48,72,58,64,70,82,68,78,85,92,78,88,94,86,80,75,82,88,95,90,85,92,98,96];
              wrap.innerHTML = heights.map(h => `<div class="flex-1 bg-indigo-500/80 rounded-t" style="height:${h}%"></div>`).join('');
            </script>
          </div>
        </section>

        <section class="rounded-xl bg-slate-900 border border-slate-800 overflow-hidden">
          <div class="p-4 border-b border-slate-800 text-sm text-slate-400">Recent signups</div>
          <table class="w-full text-sm">
            <thead class="text-slate-400 text-left">
              <tr><th class="px-4 py-2 font-normal">Email</th><th class="px-4 py-2 font-normal">Plan</th><th class="px-4 py-2 font-normal">Date</th></tr>
            </thead>
            <tbody>
              <tr class="border-t border-slate-800"><td class="px-4 py-2">ada@labs.io</td><td>Team</td><td class="text-slate-400">2h ago</td></tr>
              <tr class="border-t border-slate-800"><td class="px-4 py-2">linus@kernel.dev</td><td>Pro</td><td class="text-slate-400">6h ago</td></tr>
              <tr class="border-t border-slate-800"><td class="px-4 py-2">grace@navy.mil</td><td>Free</td><td class="text-slate-400">1d ago</td></tr>
            </tbody>
          </table>
        </section>
      </main>
    </div>
  </body>
</html>
