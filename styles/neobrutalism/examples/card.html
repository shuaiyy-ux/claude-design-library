<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>Neo-brutalism card</title>
    <style>
      body { background: #FFFBF0; font-family: Inter, sans-serif; padding: 64px; color: #0A0A0A; }
      .card { max-width: 320px; padding: 24px; background: #B5EAD7; border: 2px solid #0A0A0A; border-radius: 8px; box-shadow: 6px 6px 0 0 #0A0A0A; }
      .card h2 { margin: 0 0 8px; font-family: 'Space Grotesk', sans-serif; font-size: 24px; }
      .card p { margin: 0 0 16px; line-height: 1.5; }
      .btn { display: inline-block; padding: 8px 16px; background: #FFE066; border: 2px solid #0A0A0A; border-radius: 6px; font-weight: 600; box-shadow: 3px 3px 0 0 #0A0A0A; }
    </style>
  </head>
  <body>
    <div class="card">
      <h2>Ship your side project</h2>
      <p>Join 1,200 indie hackers launching weekly.</p>
      <a class="btn" href="#">Join →</a>
    </div>
  </body>
</html>
