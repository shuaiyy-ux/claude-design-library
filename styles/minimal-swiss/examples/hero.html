<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>Swiss hero</title>
    <style>
      body { margin: 0; font-family: Inter, Helvetica, sans-serif; color: #0A0A0A; background: #fff; }
      .wrap { max-width: 1280px; margin: 0 auto; padding: 120px 48px; display: grid; grid-template-columns: repeat(12, 1fr); gap: 24px; }
      h1 { grid-column: 1 / 9; font-size: clamp(48px, 8vw, 96px); line-height: 1; font-weight: 700; letter-spacing: -0.03em; margin: 0; }
      .meta { grid-column: 10 / 13; font-size: 13px; text-transform: uppercase; letter-spacing: 0.08em; border-top: 1px solid #0A0A0A; padding-top: 8px; }
      .accent { color: #E63946; }
    </style>
  </head>
  <body>
    <section class="wrap">
      <h1>Design <span class="accent">systems</span>, not screens.</h1>
      <div class="meta">Issue 01 / 2026</div>
    </section>
  </body>
</html>
