<!doctype html>
<html>
  <head><meta charset="utf-8" /><title>Terminal</title>
    <style>
      body { margin: 0; min-height: 100vh; background: #0C0C0C; color: #33FF33; font-family: 'VT323', 'IBM Plex Mono', monospace; font-size: 22px; padding: 40px; text-shadow: 0 0 6px currentColor; position: relative; }
      body::after { content: ''; position: fixed; inset: 0; pointer-events: none; background: repeating-linear-gradient(0deg, rgba(0,0,0,0.2) 0px, rgba(0,0,0,0.2) 1px, transparent 1px, transparent 3px); }
      .cursor { display: inline-block; width: 12px; height: 22px; background: #33FF33; vertical-align: middle; animation: blink 1s step-end infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .amber { color: #FFB000; }
    </style>
  </head>
  <body>
    <pre>
┌──────────────────────────────┐
│  <span class="amber">CLAUDE-DESIGN-LIBRARY v1</span>   │
└──────────────────────────────┘

&gt; ls styles/
brutalism  glassmorphism  retro-terminal  ...

&gt; <span class="cursor"></span>
    </pre>
  </body>
</html>
