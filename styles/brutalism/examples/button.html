<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Brutalism button</title>
    <style>
      body { background: #FFEB00; font-family: 'Helvetica Neue', Arial, sans-serif; padding: 64px; }
      .btn {
        display: inline-block;
        padding: 16px 32px;
        background: #fff;
        color: #000;
        border: 3px solid #000;
        box-shadow: 8px 8px 0 0 #000;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        cursor: pointer;
      }
      .btn:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0 0 #000; }
    </style>
  </head>
  <body><button class="btn">Subscribe →</button></body>
</html>
