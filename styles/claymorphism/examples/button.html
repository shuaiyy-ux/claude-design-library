<!doctype html>
<html>
  <head><meta charset="utf-8" />
    <style>
      body { background: #E0E5EC; font-family: Nunito, sans-serif; padding: 80px; }
      .btn { padding: 20px 36px; background: #E0E5EC; color: #4A4E69; border: none; border-radius: 24px; font-size: 16px; font-weight: 700; box-shadow: inset 6px 6px 12px rgba(255,255,255,0.9), inset -6px -6px 12px rgba(163,177,198,0.6), 8px 8px 20px rgba(163,177,198,0.5); cursor: pointer; }
      .btn:active { box-shadow: inset 4px 4px 8px rgba(163,177,198,0.6), inset -4px -4px 8px rgba(255,255,255,0.9); }
    </style>
  </head>
  <body><button class="btn">Press me</button></body>
</html>
