<!doctype html>
<html>
  <head><meta charset="utf-8" />
    <style>
      body { background: #C8C8C8; font-family: 'Lucida Grande', sans-serif; padding: 80px; }
      .btn { padding: 10px 20px; color: #1A1A1A; background: linear-gradient(180deg, #F4F4F4 0%, #D0D0D0 100%); border: 1px solid #888; border-radius: 8px; font-weight: 600; box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), inset 0 -1px 0 rgba(0,0,0,0.2), 0 2px 4px rgba(0,0,0,0.25); cursor: pointer; }
      .btn:active { background: linear-gradient(180deg, #BFBFBF 0%, #D5D5D5 100%); box-shadow: inset 0 1px 3px rgba(0,0,0,0.35); }
    </style>
  </head>
  <body><button class="btn">OK</button></body>
</html>
